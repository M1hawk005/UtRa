<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UtRa Navigation System // TACTICAL</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-panel">
        <div class="panel-header" id="panel-header">
            <h1 class="drag-handle">UTRA_NAV_SYS_v1</h1>
            <button id="toggle-panel">_</button>
        </div>
        
        <div id="panel-content">
            <div class="wireframe-box"></div>
            <form id="nav-form">
            <div class="input-group">
                <label for="start">SOURCE_NODE</label>
                <input type="text" id="start" value="Sol" required>
            </div>
            <div class="input-group">
                <label for="end">TARGET_NODE</label>
                <input type="text" id="end" value="HIP 611" required>
            </div>
            <div class="input-group row">
                <div>
                    <label for="dist">MAX_JUMP_RNG (PC)</label>
                    <input type="number" id="dist" value="500" step="1" required>
                </div>
                <div>
                    <label for="speed">VELOCITY_c</label>
                    <input type="number" id="speed" value="0.99" step="0.01" max="0.999" min="0.01" required>
                </div>
            </div>
            <button type="submit">INITIATE_ROUTING</button>
        </form>

        <div id="results" class="hidden">
            <div id="error-message" class="error hidden"></div>
            <div id="success-message">
                <h3>// TELEMETRY_DATA</h3>
                <p>TOT_DISTANCE <span id="res-dist" class="highlight"></span></p>
                <p>OBS_TIME (YRS) <span id="res-obs"></span></p>
                <p>SHP_TIME (YRS) <span id="res-ship" class="highlight"></span></p>
                
                <h3 class="mt-10">// WAYPOINT_SEQ</h3>
                <ul id="hop-list"></ul>
            </div>
        </div>
        </div>
    </div>

    <!-- Three.js and OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="app.js"></script>
</body>
</html>
