<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UtRa Navigation System // TACTICAL</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <!-- Unified dark sci-fi / Tokyo Night theme. Redefines the design tokens and
         reconciles the few elements that hard-coded off-palette colours so every
         panel, button, input and card shares one system. Loaded after style.css so
         the token overrides cascade everywhere without touching the base rules. -->
    <style>
    :root {
        /* Surfaces — one dark navy family, no more mixed blacks and dark-blues */
        --bg: #0e0e14;
        --surface: #16161e;
        --panel-bg: rgba(16, 17, 24, 0.85);
        --glass: rgba(16, 17, 24, 0.82);

        /* Framing — a single cyan accent replaces the stray white borders */
        --border: #55f6ff;
        --border-soft: rgba(85, 246, 255, 0.30);
        --border-hair: rgba(192, 202, 245, 0.14);

        /* Text — Tokyo Night foregrounds (primary / secondary / dim) */
        --text-primary: #c0caf5;
        --text-secondary: #a9b1d6;
        --text: #c0caf5;
        --text-dim: #565f89;
        --dim: #565f89;

        /* Accents — cyan for structure, amber for data highlights */
        --neon-cyan: #55f6ff;
        --neon-amber: #ffc45c;
        --highlight: #ffc45c;
        --danger: #f7768e;

        --font-mono: 'Share Tech Mono', 'Courier New', Courier, monospace;

        /* Typographic scale — three coherent steps across the whole UI.
           small  : labels, data pairs, captions, links
           medium : body copy, buttons, autocomplete options
           large  : inputs / search field and card / panel titles */
        --text-sm: 0.8125rem;   /* 13px */
        --text-md: 0.9375rem;   /* 15px */
        --text-lg: 1.0625rem;   /* 17px */
    }

    /* Base type scale across the entire application */
    body {
        font-size: var(--text-md);
        line-height: 1.5;
    }

    /* Floating search shared the panel geometry but used a solid black fill;
       give it the same translucent glass and cyan frame as every other panel. */
    .floating-search-container {
        background: var(--glass);
        border-color: var(--border-soft);
        box-shadow: 0 4px 16px rgba(85, 246, 255, 0.10);
    }

    /* On-theme error state instead of pure #ff0000. */
    .error {
        color: var(--danger);
        border-color: var(--danger);
        background: rgba(247, 118, 142, 0.10);
    }

    /* Structural hairlines were pure-white rgba; tie them to the palette. */
    #hop-list,
    #hop-list li,
    .autocomplete-option { border-color: var(--border-hair); }

    input:focus {
        border-bottom-color: var(--neon-cyan);
        background: rgba(85, 246, 255, 0.06);
    }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="floating-search" class="combobox-wrapper floating-search-container">
        <div style="display: flex;">
            <button id="btn-home-search" type="button" aria-label="Home" title="Home" style="cursor:pointer;width:auto;margin-top:0;border:none;border-right:1px solid var(--border);padding:0 1rem;min-height:44px;display:flex;align-items:center;justify-content:center;background:transparent;pointer-events:auto;position:relative;z-index:9999;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="pointer-events:none;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </button>
            <label for="star-search" class="sr-only">Search</label>
            <input type="text" id="star-search" placeholder="Search stars or Sagittarius A*" autocomplete="off" role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="search-listbox" style="flex-grow: 1;">
            <button id="btn-route-mode" type="button" aria-label="Directions" aria-expanded="false" aria-controls="ui-panel" title="Directions" style="width: auto; margin-top: 0; border: none; border-left: 1px solid var(--border); padding: 0 1rem; min-height: 44px; display: flex; align-items: center; justify-content: center;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 22 12 12 22 2 12"></polygon><path d="M9 16v-3a2 2 0 0 1 2-2h4"></path><polyline points="12 8 15 11 12 14"></polyline></svg>
            </button>
        </div>
        <ul id="search-listbox" role="listbox" class="autocomplete-listbox" hidden></ul>
    </div>
    
    <div id="ui-panel" class="hidden directions-card" aria-hidden="true" inert>
        <div class="panel-header" id="panel-header">
            <h1 class="drag-handle sr-only">Directions</h1>
            <div style="display:flex; align-items:center; width: 100%; gap: 0.5rem; margin-bottom: 1rem;">
                <button id="btn-search-mode" type="button" aria-label="Return to search mode" aria-controls="floating-search" style="cursor:pointer;margin:0;padding:0;width:44px;min-height:44px;border:none;background:transparent;display:flex;justify-content:center;align-items:center;pointer-events:auto;position:relative;z-index:9999;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="pointer-events:none;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </button>
                <div style="flex-grow: 1;">Directions</div>
                <button id="toggle-panel" type="button" aria-label="Collapse navigation panel" aria-expanded="true" style="border: none; background: transparent;">_</button>
            </div>
        </div>
        
        <div id="panel-content">
            <form id="nav-form">
            <div class="input-group combobox-wrapper">
                <label for="start">Start</label>
                <input type="text" id="start" value="Sol" required autocomplete="off" role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="start-listbox">
                <ul id="start-listbox" role="listbox" class="autocomplete-listbox" hidden></ul>
            </div>
            <div class="input-group combobox-wrapper">
                <label for="end">Destination</label>
                <input type="text" id="end" value="" required autocomplete="off" role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="end-listbox">
                <ul id="end-listbox" role="listbox" class="autocomplete-listbox" hidden></ul>
            </div>
            <div class="input-group row advanced-row">
                <div>
                    <label for="dist">Max jump (pc)</label>
                    <input type="number" id="dist" value="500" step="1" required>
                </div>
                <div>
                    <label for="speed">Speed (c)</label>
                    <input type="number" id="speed" value="0.99" step="0.01" max="0.999" min="0.01" required>
                </div>
            </div>
            <button type="submit">Find route</button>
        </form>

        <div id="results" class="hidden">
            <div id="error-message" class="error hidden"></div>
            <div id="success-message">
                <h3>Telemetry</h3>
                <div class="route-summary" aria-label="Route summary">
                    <p><span>Total Distance</span><strong id="res-dist" class="highlight"></strong></p>
                    <p><span>Observer Time (yrs)</span><strong id="res-obs"></strong></p>
                    <p><span>Ship Time (yrs)</span><strong id="res-ship" class="highlight"></strong></p>
                </div>

                <div class="hop-controls" aria-label="Route hop navigation">
                    <button id="btn-prev-hop" type="button" aria-label="Focus previous route hop">&#8592;</button>
                    <div class="hop-status" aria-live="polite">
                        <span id="hop-progress">HOP 0 / 0</span>
                        <span id="hop-current">NO ROUTE LOCK</span>
                    </div>
                    <button id="btn-next-hop" type="button" aria-label="Focus next route hop">&#8594;</button>
                </div>
                
                <button id="btn-map-mode" type="button" class="mt-10" style="width:100%" aria-label="Enter fullscreen map mode">Map view</button>

                <h3 class="mt-10">Waypoints</h3>
                <ol id="hop-list" aria-label="Route waypoints"></ol>
            </div>
        </div>
        </div>
    </div>

    <div id="map-mode-controls" class="hidden" aria-hidden="true">
        <button id="map-btn-prev-hop" class="floating-btn left" type="button" aria-label="Focus previous route hop">&#8592;</button>
        <button id="map-btn-next-hop" class="floating-btn right" type="button" aria-label="Focus next route hop">&#8594;</button>
        <button id="map-btn-restore" class="floating-btn bottom" type="button" aria-label="Restore UI">Show UI</button>
    </div>

    <aside id="star-details" hidden aria-label="Focused star details">
        <div class="card-header">
            <h2></h2>
            <button class="card-toggle" aria-label="Collapse card" title="Collapse">−</button>
        </div>
        <div class="card-body">
            <dl></dl>
            <a target="_blank" rel="noopener noreferrer">SEARCH WIKIPEDIA ↗</a>
        </div>
    </aside>

    <!-- Three.js and OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- Custom App Logic -->
    <script src="js/autocomplete.js?v=1"></script>
    <script src="js/visual_logic.js"></script>
    <script src="js/overview_sky.js"></script>
    <script src="js/transition.js"></script>
    <script src="js/wheel_zoom.js"></script>
    <script src="js/star_picking.js"></script>
    <script src="js/pointer_state.js"></script>
    <script src="app.js?v=10"></script>
</body>
</html>
